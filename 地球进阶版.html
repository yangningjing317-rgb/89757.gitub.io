// 初始化 3D 地球地图
const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11', 
  projection: 'globe', 
  center: [110, 35], 
  zoom: 1.5, 
  pitch: 0 
});

// 转换为 GeoJSON 格式
const geojsonData = {
  type: 'FeatureCollection',
  features: cities.map(city => ({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: [city.lng, city.lat] },
    properties: {
      name: city.name,
      shortName: city.name.split(' ')[0], 
      career: city.career,
      life: city.life,
      imageUrl: city.imageUrl || null // 动态绑定图片数据
    }
  }))
};

let popup = new mapboxgl.Popup({ closeButton: false, closeOnClick: false, offset: 15 });
const infoPanel = document.getElementById("infoPanel");

// 地图加载完成后，配置深空与数据点
map.on('style.load', () => {
  map.setFog({
    'color': 'rgb(12, 16, 33)', 
    'high-color': '#1e3a8a', 
    'space-color': '#020617', 
    'star-intensity': 0.8 
  });

  map.addLayer({
    'id': '3d-buildings',
    'source': 'composite',
    'source-layer': 'building',
    'filter': ['==', 'extrude', 'true'],
    'type': 'fill-extrusion',
    'minzoom': 14,
    'paint': {
      'fill-extrusion-color': '#1e293b', 
      'fill-extrusion-height': ['get', 'height'],
      'fill-extrusion-base': ['get', 'min_height'],
      'fill-extrusion-opacity': 0.8
    }
  });

  map.addSource('cities-data', {
    type: 'geojson',
    data: geojsonData
  });

  // 呼吸波纹层
  map.addLayer({
    id: 'city-pulse',
    type: 'circle',
    source: 'cities-data',
    paint: {
      'circle-color': '#60a5fa',
      'circle-radius': 4, 
      'circle-opacity': 0.8, 
      'circle-pitch-alignment': 'map' 
    }
  });

  // 实心核心层
  map.addLayer({
    id: 'city-core',
    type: 'circle',
    source: 'cities-data',
    paint: {
      'circle-color': '#93c5fd',
      'circle-radius': 5,
      'circle-stroke-width': 1,
      'circle-stroke-color': '#ffffff',
      'circle-pitch-alignment': 'map'
    }
  });

  // WebGL 动画循环
  let radius = 4;
  let opacity = 0.8;
  function animatePulse() {
    radius += 0.2;
    opacity -= 0.015;
    if (radius > 20) {
      radius = 4;
      opacity = 0.8;
    }
    if (map.getLayer('city-pulse')) {
      map.setPaintProperty('city-pulse', 'circle-radius', radius);
      map.setPaintProperty('city-pulse', 'circle-opacity', Math.max(0, opacity));
    }
    requestAnimationFrame(animatePulse);
  }
  animatePulse(); 
});

// 交互：鼠标悬停
map.on('mouseenter', 'city-core', (e) => {
  map.getCanvas().style.cursor = 'pointer';
  const coordinates = e.features[0].geometry.coordinates.slice();
  const name = e.features[0].properties.shortName;
  popup.setLngLat(coordinates).setHTML(`<b>${name}</b>`).addTo(map);
});

map.on('mouseleave', 'city-core', () => {
  map.getCanvas().style.cursor = '';
  popup.remove();
});

// 交互：点击下钻并显示文字面板
map.on('click', 'city-core', (e) => {
  const props = e.features[0].properties;
  const coords = e.features[0].geometry.coordinates;

  // 填充文字数据
  document.getElementById("cityName").innerText = props.name;
  document.getElementById("careerText").innerText = props.career;
  document.getElementById("lifeText").innerText = props.life;
  
  // 处理动态图片逻辑
  const cityImage = document.getElementById("cityImage");
  if (props.imageUrl && props.imageUrl !== "null") {
    cityImage.src = props.imageUrl;
    cityImage.classList.remove("hidden"); // 显示图片
  } else {
    cityImage.src = "";
    cityImage.classList.add("hidden"); // 没有图片时隐藏
  }
  
  infoPanel.style.transform = "translateX(0)";

  map.flyTo({
    center: coords,
    zoom: 14.5, 
    pitch: 60, 
    bearing: 30, 
    duration: 4000, 
    essential: true
  });
});

// 交互：关闭面板退回宇宙
document.getElementById("closeBtn").addEventListener("click", () => {
  infoPanel.style.transform = "translateX(100%)";

  map.flyTo({
    zoom: 1.5,
    pitch: 0,
    bearing: 0,
    duration: 3000,
    essential: true
  });
});

// 开场平滑引入动画
map.on('load', () => {
  map.flyTo({
    center: [110, 35],
    zoom: 2.5,
    duration: 5000,
    essential: true
  });
});
</script>

</body>
</html>
