  { name: "Boston (USA)", lat: 42.3601, lng: -71.0589, imageUrl: "boston.jpg", career: "US Northeast tech and education core. Focuses on biomedicine, AI, and financial services. Backed by Harvard and MIT, the biomedicine industry ranks first nationally.", life: "Blend of history and modernity. Top-tier educational resources, high medical standards. Higher living costs, moderate pace, distinct seasons, deep cultural atmosphere." },
  { name: "Dallas (USA)", lat: 32.7767, lng: -96.7970, career: "US Southern economic core. Focuses on aerospace, electronics manufacturing, financial services, and logistics. HQ of American Airlines. Radiates across the Southern region.", life: "Expansive city, prosperous commerce, moderate living costs, complete facilities. Hot climate, moderate pace, improving greenery, good livability for long-term career growth." },
  { name: "Atlanta (USA)", lat: 33.7490, lng: -84.3880, career: "US Southeastern transport and tech core. Focuses on aviation logistics, film, biomedicine, and finance. Atlanta Airport is the world's busiest. Highly developed film industry.", life: "Bustling commerce, premium education and healthcare, moderate living costs. Highly connected transport network. Warm and humid climate, moderate pace, highly inclusive." },
  { name: "Seattle (USA)", lat: 47.6062, lng: -122.3321, career: "US Northwest tech and aviation core. Focuses on aerospace, software R&D, and biomedicine. HQ of Boeing, Microsoft, and Amazon. Globally leading tech and aviation sectors.", life: "Coastal hilly city with beautiful Mount Rainier views. Humid climate, clean city, premium education. Higher living costs, moderate pace, pristine ecology, strong tech vibe." },
  { name: "Detroit (USA)", lat: 42.3314, lng: -83.0458, career: "America's 'Motor City'. Focuses on auto manufacturing, NEVs, and auto parts. Gathers HQs of GM, Ford, and Chrysler, pushing the transition to new energy vehicles.", life: "Deep industrial heritage, low living costs, gradually improving facilities. Distinct four seasons, moderate pace. The city is transforming, with steadily improving livability." }
];

// Initialize 3D Globe Map
const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11', 
  projection: 'globe', 
  center: [110, 35], 
  zoom: 2.0, 
  pitch: 0 
});

// Convert to GeoJSON Format
const geojsonData = {
  type: 'FeatureCollection',
  features: cities.map(city => ({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: [city.lng, city.lat] },
    properties: {
      name: city.name,
      shortName: city.name.split(' (')[0], // Safely split English strings with parentheses
      career: city.career,
      life: city.life,
      imageUrl: city.imageUrl || null
    }
  }))
};

let popup = new mapboxgl.Popup({ closeButton: false, closeOnClick: false, offset: 15 });
const infoPanel = document.getElementById("infoPanel");

// Map load event
map.on('style.load', () => {
  map.setFog({
    'color': 'rgb(12, 16, 33)', 
    'high-color': '#1e3a8a', 
    'space-color': '#020617', 
    'star-intensity': 0.8 
  });

  map.addLayer({
    'id': '3d-buildings',
    'source': 'composite',
    'source-layer': 'building',
    'filter': ['==', 'extrude', 'true'],
    'type': 'fill-extrusion',
    'minzoom': 14,
    'paint': {
      'fill-extrusion-color': '#1e293b', 
      'fill-extrusion-height': ['get', 'height'],
      'fill-extrusion-base': ['get', 'min_height'],
      'fill-extrusion-opacity': 0.8
    }
  });

  map.addSource('cities-data', {
    type: 'geojson',
    data: geojsonData
  });

  // Breathing Ripple Layer
  map.addLayer({
    id: 'city-pulse',
    type: 'circle',
    source: 'cities-data',
    paint: {
      'circle-color': '#60a5fa',
      'circle-radius': 4, 
      'circle-opacity': 0.8, 
      'circle-pitch-alignment': 'map' 
    }
  });

  // Solid Core Layer
  map.addLayer({
    id: 'city-core',
    type: 'circle',
    source: 'cities-data',
    paint: {
      'circle-color': '#93c5fd',
      'circle-radius': 5,
      'circle-stroke-width': 1,
      'circle-stroke-color': '#ffffff',
      'circle-pitch-alignment': 'map'
    }
  });

  // WebGL Animation Loop
  let radius = 4;
  let opacity = 0.8;
  function animatePulse() {
    radius += 0.2;
    opacity -= 0.015;
    if (radius > 20) {
      radius = 4;
      opacity = 0.8;
    }
    if (map.getLayer('city-pulse')) {
      map.setPaintProperty('city-pulse', 'circle-radius', radius);
      map.setPaintProperty('city-pulse', 'circle-opacity', Math.max(0, opacity));
    }
    requestAnimationFrame(animatePulse);
  }
  animatePulse(); 
});

// Hover Interactions
map.on('mouseenter', 'city-core', (e) => {
  map.getCanvas().style.cursor = 'pointer';
  const coordinates = e.features[0].geometry.coordinates.slice();
  const name = e.features[0].properties.shortName;
  popup.setLngLat(coordinates).setHTML(`<b>${name}</b>`).addTo(map);
});

map.on('mouseleave', 'city-core', () => {
  map.getCanvas().style.cursor = '';
  popup.remove();
});

// Click Interaction
map.on('click', 'city-core', (e) => {
  const props = e.features[0].properties;
  const coords = e.features[0].geometry.coordinates;

  document.getElementById("cityName").innerText = props.name;
  document.getElementById("careerText").innerText = props.career;
  document.getElementById("lifeText").innerText = props.life;
  
  const cityImage = document.getElementById("cityImage");
  if (props.imageUrl && props.imageUrl !== "null") {
    cityImage.src = props.imageUrl;
    cityImage.classList.remove("hidden");
  } else {
    cityImage.src = "";
    cityImage.classList.add("hidden");
  }
  
  infoPanel.style.transform = "translateX(0)";

  map.flyTo({
    center: coords,
    zoom: 14.5, 
    pitch: 60, 
    bearing: 30, 
    duration: 4000, 
    essential: true
  });
});

// Close Panel
document.getElementById("closeBtn").addEventListener("click", () => {
  infoPanel.style.transform = "translateX(100%)";

  map.flyTo({
    zoom: 3.0,
    pitch: 0,
    bearing: 0,
    duration: 3000,
    essential: true
  });
});

// Smooth Intro FlyTo
map.on('load', () => {
  map.flyTo({
    center: [110, 35],
    zoom: 2.5,
    duration: 5000,
    essential: true
  });
});
</script>

</body>
